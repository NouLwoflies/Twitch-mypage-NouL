<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>推し事の書</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-orange: #e67e22;
            --twitch-purple: #9146ff;
            --text-navy: #2c3e50;
            --bg-card: rgba(255, 255, 255, 0.95);
        }

        body { 
            margin: 0; padding: 0; font-family: 'M PLUS 1p', sans-serif;
            background-image: url('https://cdn.discordapp.com/attachments/866687772056092682/1479124828115046450/525_20241011150841.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden; touch-action: pan-y;
        }

        .viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        .main-wrapper {
            display: flex; width: 300vw; height: 100vh;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .page-section {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 30px; box-sizing: border-box; overflow-y: auto; padding-bottom: 120px;
        }

        .card { 
            background: var(--bg-card); border-radius: 30px; border: 3px solid #ffcc80; padding: 25px 20px;
            width: 88%; max-width: 360px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); color: var(--text-navy);
        }

        h1 { font-size: 1.4rem; color: var(--accent-orange); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; border-bottom: 2px solid #ffcc80; padding-bottom: 10px; }
        
        .status-row { display: flex; justify-content: space-between; font-weight: 800; margin: 10px 0; border-bottom: 1px dashed #eee; padding-bottom: 5px; font-size: 0.9rem; }
        .crystal-text { color: #2980b9; }

        /* EXP & レベルエリア */
        .level-container { text-align: left; margin: 20px 0; }
        .level-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .level-num { font-size: 2.8rem; font-weight: 900; color: var(--accent-orange); line-height: 1; }
        .exp-text { font-size: 0.75rem; font-weight: 800; color: #999; }
        .exp-outline { background: #eee; height: 12px; border-radius: 6px; margin-top: 8px; overflow: hidden; border: 1px solid #ddd; }
        .exp-fill { background: linear-gradient(90deg, #ffcc80, #e67e22); height: 100%; width: 0%; transition: 1.5s ease-out; }

        /* セクションタイトル（横線） */
        .section-title { font-size: 0.7rem; font-weight: 800; color: #bbb; margin: 20px 0 10px; display: flex; align-items: center; justify-content: center; letter-spacing: 1px; }
        .section-title::before, .section-title::after { content: ""; flex: 1; height: 1px; background: #eee; margin: 0 10px; }

        .btn-main { background: var(--accent-orange); color: white; border: none; border-radius: 15px; padding: 14px; width: 100%; font-weight: 800; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 0 #d35400; margin-bottom: 10px; }
        .btn-sub { background: white; border: 2px solid #ffcc80; border-radius: 12px; padding: 10px 5px; font-weight: 800; color: var(--accent-orange); font-size: 0.75rem; cursor: pointer; }
        
        /* ナビゲーション */
        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 75%; max-width: 280px; height: 65px; background: rgba(255, 255, 255, 0.98); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 8px 25px rgba(0,0,0,0.1); z-index: 1000; border: 1px solid #eee; }
        .nav-item { border: none; background: none; font-size: 1.4rem; color: #ddd; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent-orange); transform: scale(1.1); }

        .reward-box { border: 2px solid #eee; border-radius: 15px; padding: 15px; margin-bottom: 10px; text-align: left; background: white; }
    </style>
</head>
<body>

<div class="viewport">
    <div class="main-wrapper" id="master-container">
        <section class="page-section">
            <div class="card">
                <h1>🦊 推し事の書 🦊</h1>
                <div id="login-area"><button class="btn-main" onclick="login()">Twitchでログイン</button></div>
                <div id="status-area" style="display:none;">
                    <div class="status-row"><span>PLAYER</span><span id="display-name">---</span></div>
                    <div class="status-row"><span>RANK</span><span id="display-rank" style="color:var(--accent-orange)">---</span></div>
                    <div class="status-row"><span class="crystal-text">CRYSTAL</span><span id="display-crystal" class="crystal-text">---</span></div>
                    
                    <div class="level-container">
                        <div class="level-header">
                            <div><span style="font-size:0.8rem; font-weight:900; color:var(--accent-orange);">LV</span><span id="display-level" class="level-num">0</span></div>
                            <div class="exp-text"><span id="display-current-exp">0</span> / <span id="display-next">0</span> EXP</div>
                        </div>
                        <div class="exp-outline"><div id="exp-bar" class="exp-fill"></div></div>
                    </div>

                    <div class="section-title">DAILY MISSION</div>
                    <button class="btn-main" onclick="playGacha('login')">🎁 1日1回ログインガチャ</button>

                    <div class="section-title">TIER GACHA</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                        <button class="btn-sub" onclick="playGacha('tier', 1)">Tier 1</button>
                        <button class="btn-sub" onclick="playGacha('tier', 2)">Tier 2</button>
                        <button class="btn-sub" onclick="playGacha('tier', 3)">Tier 3</button>
                    </div>
                </div>
            </div>
        </section>
        <section class="page-section"><div class="card"><h1>🏆 BATTLE PASS</h1><div id="reward-list"></div></div></section>
        <section class="page-section"><div class="card"><h1>📜 GACHA LOG</h1><div id="log-content"></div></div></section>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="updatePage(0)">👤</button>
    <button class="nav-item" onclick="updatePage(1)">🏆</button>
    <button class="nav-item" onclick="updatePage(2)">📜</button>
</nav>

<script>
    const CLIENT_ID = '3x3nwbmhvpdx1bxzs9d540ga31ud6b';
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/14CnmqmOSGrLVvZcS-aeAA1pruGocgidtwC2ax7ArJhI/gviz/tq?tqx=out:csv&sheet=Users';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxvnNqZbUMZKskqan4HJtexJCf37oG1s2xJHHJCBNchdm8G5Ri_qBgQyHrayYXMwwEy/exec';
    let loginID = "", currentPage = 0;

    function updatePage(index) {
        currentPage = index;
        document.getElementById('master-container').style.transform = `translateX(-${index * 100}vw)`;
        document.querySelectorAll('.nav-item').forEach((n, i) => i === index ? n.classList.add('active') : n.classList.remove('active'));
    }

    let startX = 0;
    document.addEventListener('touchstart', e => { startX = e.touches[0].pageX; });
    document.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].pageX - startX;
        if (Math.abs(diff) > 60) {
            if (diff < 0 && currentPage < 2) updatePage(currentPage + 1);
            if (diff > 0 && currentPage > 0) updatePage(currentPage - 1);
        }
    });

    function login() { window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&response_type=token&scope=user:read:email`; }

    window.onload = function() {
        const token = new URLSearchParams(window.location.hash.substring(1)).get('access_token');
        if (token) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('status-area').style.display = 'block';
            fetch('https://api.twitch.tv/helix/users', { headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` } })
                .then(r => r.json()).then(d => { loginID = d.data[0].login; fetchUserData(); });
        }
    };

    async function fetchUserData() {
        const res = await fetch(SHEET_URL);
        const txt = await res.text();
        const rows = txt.split('\n').map(r => r.split(',').map(c => c.replace(/"/g,'')));
        const user = rows.find(r => r[1] && r[1].toLowerCase().trim() === loginID.toLowerCase());
        
        if (user) {
            document.getElementById('display-name').innerText = user[0];
            document.getElementById('display-rank').innerText = user[8] || "サポーター";
            document.getElementById('display-crystal').innerText = user[5];
            document.getElementById('display-level').innerText = user[7];

            const totalExp = parseInt(user[6]) || 0;
            const level = parseInt(user[7]) || 1;
            const progress = getLevelProgress(totalExp, level);
            document.getElementById('display-current-exp').innerText = progress.current;
            document.getElementById('display-next').innerText = progress.next;
            setTimeout(() => { document.getElementById('exp-bar').style.width = Math.min((progress.current/progress.next)*100, 100) + '%'; }, 500);
        }
    }

    function getLevelProgress(totalExp, level) {
        const cfg = [{l:10,c:100},{l:20,c:500},{l:30,c:1000},{l:40,c:1500},{l:50,c:2000},{l:60,c:3000},{l:70,c:4000},{l:80,c:5000},{l:90,c:7000},{l:100,c:9000}];
        let acc = 0, curL = 1;
        for (let r of cfg) { while (curL < r.l) { if (curL < level) { acc += r.c; curL++; } else return { current: Math.max(0, totalExp - acc), next: r.c }; } }
        return { current: (totalExp - 330900) % 10000, next: 10000 };
    }

    function playGacha(type, val) {
        fetch(`${GAS_URL}?user=${loginID}&${type === 'login' ? 'type=login' : 'gacha='+val}`)
            .then(r => r.text()).then(m => { alert(m); location.reload(); });
    }
</script>
</body>
</html>
