<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推し事の書</title>
    <style>
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); color: #5d00a8; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.95); border: 4px solid #ffb347; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(224, 176, 255, 0.5); text-align: center; width: 340px; }
        h1 { color: #ff8c00; font-size: 1.8rem; margin-bottom: 20px; text-shadow: 1px 1px 0px #fff; }
        .status-item { font-size: 1.1rem; margin: 10px 0; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px dashed #e0b0ff; }
        .crystal { color: #00b4d8; font-size: 1.3rem; }
        .tier-badge { padding: 5px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; background: #eee; color: #aaa; }
        .tier-active { background: #9146ff; color: white; box-shadow: 0 0 10px rgba(145, 70, 255, 0.5); }
        .exp-container { text-align: left; margin: 20px 0; }
        .exp-text { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; }
        .exp-outline { background: #eee; height: 14px; border-radius: 7px; margin-top: 5px; overflow: hidden; border: 1px solid #ffb347; }
        .exp-fill { background: linear-gradient(to right, #ffb347, #ff8c00); height: 100%; width: 0%; transition: 1.5s ease-out; }
        .login-btn { background: #9146ff; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .sub-btn { background: white; border: 2px solid #ffb347; color: #ff8c00; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>推し事の書</h1>
        <div id="login-area"><button class="login-btn" onclick="login()">Twitchでログイン 🧡</button></div>
        <div id="status-area" style="display:none;">
            <div class="status-item"><span>PLAYER:</span> <span id="display-name">---</span></div>
            <div class="status-item"><span style="color:#ff8c00;">RANK:</span> <span id="display-rank">---</span></div>
            <div class="status-item"><span class="crystal">CRYSTAL:</span> <span id="display-bits" class="crystal">0</span></div>
            
            <div style="display: flex; justify-content: space-around; margin: 15px 0;">
                <div id="t1-badge" class="tier-badge">Tier 1</div>
                <div id="t2-badge" class="tier-badge">Tier 2</div>
                <div id="t3-badge" class="tier-badge">Tier 3</div>
            </div>

            <div class="exp-container">
                <div class="exp-text">
                    <span>Lv. <span id="display-level">0</span></span>
                    <span><span id="display-current-exp">0</span> / <span id="display-next">0</span></span>
                </div>
                <div class="exp-outline"><div id="exp-bar" class="exp-fill"></div></div>
            </div>

            <div style="margin-top:15px; border-top: 2px dashed #ffb347; padding-top:10px;">
                <p style="font-size:0.8rem; font-weight:bold;">💎 CRYSTAL GACHA💎</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <button onclick="playGacha(100)" class="sub-btn">100円</button>
                    <button onclick="playGacha(500)" class="sub-btn">500円</button>
                    <button onclick="playGacha(1000)" class="sub-btn">1000円</button>
                    <button onclick="playGacha(5000)" class="sub-btn">5000円</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '3x3nwbmhvpdx1bxzs9d540ga31ud6b'; 
        const SHEET_ID = '14CnmqmOSGrLVvZcS-aeAA1pruGocgidtwC2ax7ArJhI';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxKcZzx87c5sHhdMdSUPKwbf0HPCWqCVs8bhLYZ6HSvJefxdkRHaUWrgqO9mv0FFezm/exec';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        let loginID = "";

        function login() { window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=user:read:email`; }

        window.onload = function() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const token = params.get('access_token');
            if (token) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('status-area').style.display = 'block';
                getUserInfo(token);
            }
        };

        async function getUserInfo(token) {
            const res = await fetch('https://api.twitch.tv/helix/users', { headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            loginID = data.data[0].login;
            fetchSheetData(loginID);
        }

        async function fetchSheetData(targetUser) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Users`;
            const res = await fetch(url);
            const csvText = await res.text();
            const rows = csvText.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
            const userData = rows.find(row => row[1] && row[1].toLowerCase().trim() === targetUser.toLowerCase());

            if (userData) {
                // 列定義: 5=Crystal, 6=TotalExp, 7=Level, 8=Rank
                const totalExp = parseInt(userData[6]) || 0;
                const level = parseInt(userData[7]) || 1;
                
                document.getElementById('display-name').innerText = userData[0];
                document.getElementById('display-rank').innerText = userData[8] || "新顔さん";
                document.getElementById('display-bits').innerText = userData[5];
                document.getElementById('display-level').innerText = level;

                // 経験値バー計算
                const progress = getLevelProgress(totalExp, level);
                document.getElementById('display-current-exp').innerText = progress.current;
                document.getElementById('display-next').innerText = progress.next;
                
                const percent = Math.min((progress.current / progress.next) * 100, 100);
                setTimeout(() => { document.getElementById('exp-bar').style.width = percent + '%'; }, 500);

                // バッジ点灯 (2=T1, 3=T2, 4=T3)
                if(userData[2] != "0") document.getElementById('t1-badge').classList.add('tier-active');
                if(userData[3] != "0") document.getElementById('t2-badge').classList.add('tier-active');
                if(userData[4] != "0") document.getElementById('t3-badge').classList.add('tier-active');
            }
        }

        // GAS側のレベル設計と完全に一致させたフロントエンド計算ロジック
      function getLevelProgress(totalExp, level) {
    // レベルごとの「1レベル上げるのに必要なEXP」の設定
    const cfg = [
        {l:10, c:100}, {l:20, c:500}, {l:30, c:1000}, {l:40, c:1500}, {l:50, c:2000},
        {l:60, c:3000}, {l:70, c:4000}, {l:80, c:5000}, {l:90, c:7000}, {l:100, c:9000}
    ];

    let accumulatedExp = 0; // そのレベルに到達するまでに必要な累計EXP
    let currentLevelStep = 1;
    let nextExpRequirement = 100; // 次の1レベルに必要な量

    // 今のレベルに到達するまでの「累計」を正しく算出する
    for (let range of cfg) {
        while (currentLevelStep < range.l) {
            if (currentLevelStep < level) {
                accumulatedExp += range.c;
                currentLevelStep++;
                nextExpRequirement = range.c; // 次のレベルに必要な量も更新
            } else {
                nextExpRequirement = range.c;
                // ここでループを抜ける
                return { 
                    current: Math.max(0, totalExp - accumulatedExp), 
                    next: nextExpRequirement 
                };
            }
        }
    }

    // Lv.100以降の計算
    const expAfter100 = totalExp - 330900;
    return { 
        current: Math.max(0, expAfter100 % 10000), 
        next: 10000 
    };
}

        async function playGacha(amount) {
            if (!loginID || !confirm(amount + "円ガチャを引きますか？")) return;
            const res = await fetch(`${GAS_URL}?user=${loginID}&gacha=${amount}`);
            alert(await res.text());
            location.reload(); // ガチャ後に数値を更新するためリロード
        }
    </script>
</body>
</html>
