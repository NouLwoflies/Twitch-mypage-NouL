<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推し事の書</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1000&q=80'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            /* お洒落なモダンフォントを適用 */
            font-family: 'M PLUS 1p', sans-serif; 
            color: #5d00a8; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(8px); 
            border: 3px solid #ffb347; padding: 30px; border-radius: 24px; 
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3); text-align: center; width: 350px; 
        }
        h1 { 
            color: #ff8c00; font-size: 1.8rem; margin-bottom: 20px; 
            font-weight: 800; letter-spacing: 2px;
            border-bottom: 3px solid #ffb347; display: inline-block; padding-bottom: 5px;
        }
        .status-item { 
            font-size: 0.95rem; margin: 12px 0; font-weight: 700; 
            display: flex; justify-content: space-between; 
            border-bottom: 1px solid #eee; padding-bottom: 6px; 
        }
        .crystal { color: #00b4d8; }
        .tier-badge { 
            padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; 
            background: #f0f0f0; color: #bbb; font-weight: 700; transition: 0.3s;
        }
        .tier-active { background: #9146ff; color: white; box-shadow: 0 4px 10px rgba(145, 70, 255, 0.3); }
        
        .exp-container { text-align: left; margin: 20px 0; }
        .exp-text { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 800; color: #ff8c00; }
        .exp-outline { background: #fdf2e2; height: 14px; border-radius: 7px; margin-top: 6px; overflow: hidden; }
        .exp-fill { background: linear-gradient(to right, #ffb347, #ff4500); height: 100%; width: 0%; transition: 1.5s ease; }
        
        /* ボタンのデザインをパキッとさせて「おしゃれ」に */
        .login-btn { 
            background: #9146ff; color: white; border: none; padding: 14px; border-radius: 12px; 
            font-weight: 800; cursor: pointer; width: 100%; font-family: inherit; font-size: 1rem; 
            margin-bottom: 15px; transition: 0.2s; box-shadow: 0 4px 15px rgba(145, 70, 255, 0.3);
        }
        .login-btn:hover { background: #772ce8; transform: translateY(-2px); }
        
        .sub-btn { 
            background: white; border: 2px solid #ffb347; color: #ff8c00; padding: 10px; border-radius: 12px; 
            cursor: pointer; font-size: 0.85rem; font-family: inherit; font-weight: 700; transition: 0.2s; 
        }
        .sub-btn:hover { background: #ffb347; color: white; }
        
        .section-title { 
            font-size: 0.75rem; font-weight: 800; margin: 20px 0 10px; color: #aaa; 
            display: flex; align-items: center; justify-content: center; letter-spacing: 2px;
        }
        .section-title::before, .section-title::after { content: ""; flex: 1; height: 1px; background: #eee; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>推し事の書</h1>

        <div id="login-area">
            <p style="font-weight: 700;">Twitch IDでログインして<br>ステータスを確認しよう</p>
            <button class="login-btn" onclick="login()">Twitch LOGIN 🧡</button>
        </div>

        <div id="status-area" style="display:none;">
            <div class="status-item"><span>PLAYER</span> <span id="display-name">---</span></div>
            <div class="status-item"><span>RANK</span> <span id="display-rank" style="color:#ff8c00;">---</span></div>
            <div class="status-item"><span class="crystal">CRYSTAL</span> <span id="display-bits" class="crystal">0</span></div>
            
            <div style="display: flex; justify-content: space-around; margin: 15px 0;">
                <div id="t1-badge" class="tier-badge">Tier 1</div>
                <div id="t2-badge" class="tier-badge">Tier 2</div>
                <div id="t3-badge" class="tier-badge">Tier 3</div>
            </div>

            <div class="exp-container">
                <div class="exp-text">
                    <span>LEVEL <span id="display-level">0</span></span>
                    <span><span id="display-current-exp">0</span> / <span id="display-next">0</span></span>
                </div>
                <div class="exp-outline"><div id="exp-bar" class="exp-fill"></div></div>
            </div>

            <div class="section-title">DAILY ガチャ</div>
            <button onclick="playGacha('login')" class="login-btn" style="background: #ff8c00; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);">🎁 DAILY EXP GACHA</button>

            <div class="section-title">Tier　ガチャ</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;">
                <button onclick="playGacha('tier', 1)" class="sub-btn">T1</button>
                <button onclick="playGacha('tier', 2)" class="sub-btn">T2</button>
                <button onclick="playGacha('tier', 3)" class="sub-btn">T3</button>
            </div>

            <div class="section-title">CRYSTAL ガチャ</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button onclick="playGacha('crystal', 100)" class="sub-btn">100</button>
                <button onclick="playGacha('crystal', 500)" class="sub-btn">500</button>
                <button onclick="playGacha('crystal', 1000)" class="sub-btn">1000</button>
                <button onclick="playGacha('crystal', 5000)" class="sub-btn">5000</button>
            </div>
        </div>
    </div>

    <script>
        /* ※Scriptは以前の動作を完全継承しています */
        const CLIENT_ID = '3x3nwbmhvpdx1bxzs9d540ga31ud6b'; 
        const SHEET_ID = '14CnmqmOSGrLVvZcS-aeAA1pruGocgidtwC2ax7ArJhI';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxKcZzx87c5sHhdMdSUPKwbf0HPCWqCVs8bhLYZ6HSvJefxdkRHaUWrgqO9mv0FFezm/exec';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        let loginID = "";

        function login() { window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=user:read:email`; }

        window.onload = function() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const token = params.get('access_token');
            if (token) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('status-area').style.display = 'block';
                getUserInfo(token);
            }
        };

        async function getUserInfo(token) {
            try {
                const res = await fetch('https://api.twitch.tv/helix/users', { headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                loginID = data.data[0].login;
                fetchSheetData(loginID);
            } catch (e) { alert("Twitch LOGIN ERROR"); }
        }

        async function fetchSheetData(targetUser) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Users`;
            const res = await fetch(url);
            const csvText = await res.text();
            const rows = csvText.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
            const userData = rows.find(row => row[1] && row[1].toLowerCase().trim() === targetUser.toLowerCase());

            if (userData) {
                document.getElementById('display-name').innerText = userData[0];
                document.getElementById('display-rank').innerText = userData[8] || "新顔さん";
                document.getElementById('display-bits').innerText = userData[5];
                document.getElementById('display-level').innerText = userData[7];

                const totalExp = parseInt(userData[6]) || 0;
                const level = parseInt(userData[7]) || 1;
                const progress = getLevelProgress(totalExp, level);
                document.getElementById('display-current-exp').innerText = progress.current;
                document.getElementById('display-next').innerText = progress.next;
                const percent = Math.min((progress.current / progress.next) * 100, 100);
                setTimeout(() => { document.getElementById('exp-bar').style.width = percent + '%'; }, 500);

                if(userData[2] != "0") document.getElementById('t1-badge').classList.add('tier-active');
                if(userData[3] != "0") document.getElementById('t2-badge').classList.add('tier-active');
                if(userData[4] != "0") document.getElementById('t3-badge').classList.add('tier-active');
            }
        }

        function getLevelProgress(totalExp, level) {
            const cfg = [{l:10,c:100},{l:20,c:500},{l:30,c:1000},{l:40,c:1500},{l:50,c:2000},{l:60,c:3000},{l:70,c:4000},{l:80,c:5000},{l:90,c:7000},{l:100,c:9000}];
            let acc = 0, curL = 1;
            for (let r of cfg) {
                while (curL < r.l) {
                    if (curL < level) { acc += r.c; curL++; }
                    else { return { current: Math.max(0, totalExp - acc), next: r.c }; }
                }
            }
            return { current: (totalExp - 330900) % 10000, next: 10000 };
        }

        async function playGacha(mode, val = 0) {
            if (!loginID || !confirm("ガチャを引きますか？")) return;
            let query = `?user=${loginID}`;
            if (mode === 'login') query += `&type=login`;
            else query += `&gacha=${val}`;

            const res = await fetch(GAS_URL + query);
            alert(await res.text());
            location.reload();
        }
    </script>
</body>
</html>
