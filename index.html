<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推し事の書</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1000&q=80'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Zen Kurenaido', sans-serif; color: #5d00a8; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); 
            border: 4px solid #ffb347; padding: 25px; border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); text-align: center; width: 350px; 
        }
        h1 { color: #ff8c00; font-size: 2.2rem; margin-bottom: 15px; text-shadow: 1px 1px 0px #fff; }
        .status-item { font-size: 1.1rem; margin: 8px 0; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px dashed #e0b0ff; }
        .crystal { color: #00b4d8; }
        .tier-badge { padding: 4px 8px; border-radius: 8px; font-size: 0.8rem; background: #eee; color: #aaa; }
        .tier-active { background: #9146ff; color: white; }
        .exp-container { text-align: left; margin: 15px 0; }
        .exp-text { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; }
        .exp-outline { background: #eee; height: 12px; border-radius: 6px; margin-top: 5px; overflow: hidden; border: 1px solid #ffb347; }
        .exp-fill { background: linear-gradient(to right, #ffb347, #ff8c00); height: 100%; width: 0%; transition: 1.5s ease-out; }
        
        /* ボタンデザイン */
        .login-btn { background: #9146ff; color: white; border: none; padding: 12px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Zen Kurenaido', sans-serif; font-size: 1.1rem; margin-bottom: 10px; }
        .sub-btn { background: white; border: 2px solid #ffb347; color: #ff8c00; padding: 6px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-family: 'Zen Kurenaido', sans-serif; font-weight: bold; }
        .sub-btn:hover { background: #fff5e6; }
        .section-title { font-size: 0.9rem; font-weight: bold; margin: 10px 0 5px; color: #666; display: flex; align-items: center; justify-content: center; }
        .section-title::before, .section-title::after { content: ""; flex: 1; height: 1px; background: #ddd; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>推し事の書</h1>

        <div id="login-area">
            <p>Twitch連携して<br>ステータスを確認しよう！</p>
            <button class="login-btn" onclick="login()">Twitchでログイン 💜</button>
        </div>

        <div id="status-area" style="display:none;">
            <div class="status-item"><span>PLAYER:</span> <span id="display-name">---</span></div>
            <div class="status-item"><span style="color:#ff8c00;">RANK:</span> <span id="display-rank">---</span></div>
            <div class="status-item"><span class="crystal">CRYSTAL:</span> <span id="display-bits" class="crystal">0</span></div>
            
            <div style="display: flex; justify-content: space-around; margin: 10px 0;">
                <div id="t1-badge" class="tier-badge">Tier 1</div>
                <div id="t2-badge" class="tier-badge">Tier 2</div>
                <div id="t3-badge" class="tier-badge">Tier 3</div>
            </div>

            <div class="exp-container">
                <div class="exp-text">
                    <span>Lv. <span id="display-level">0</span></span>
                    <span><span id="display-current-exp">0</span> / <span id="display-next">0</span></span>
                </div>
                <div class="exp-outline"><div id="exp-bar" class="exp-fill"></div></div>
            </div>

            <div class="section-title">SPECIAL</div>
            <button onclick="playGacha('login')" class="login-btn" style="background: #ff8c00;">🎁 1日1回ログインEXPガチャ</button>

            <div class="section-title">Tier　ガチャ</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px;">
                <button onclick="playGacha('tier', 1)" class="sub-btn">Tier 1</button>
                <button onclick="playGacha('tier', 2)" class="sub-btn">Tier 2</button>
                <button onclick="playGacha('tier', 3)" class="sub-btn">Tier 3</button>
            </div>

            <div class="section-title">CRYSTAL ガチャ</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button onclick="playGacha('crystal', 100)" class="sub-btn">100円</button>
                <button onclick="playGacha('crystal', 500)" class="sub-btn">500円</button>
                <button onclick="playGacha('crystal', 1000)" class="sub-btn">1000円</button>
                <button onclick="playGacha('crystal', 5000)" class="sub-btn">5000円</button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '3x3nwbmhvpdx1bxzs9d540ga31ud6b'; 
        const SHEET_ID = '14CnmqmOSGrLVvZcS-aeAA1pruGocgidtwC2ax7ArJhI';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxKcZzx87c5sHhdMdSUPKwbf0HPCWqCVs8bhLYZ6HSvJefxdkRHaUWrgqO9mv0FFezm/exec';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        let loginID = "";

        function login() { window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=user:read:email`; }

        window.onload = function() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const token = params.get('access_token');
            if (token) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('status-area').style.display = 'block';
                getUserInfo(token);
            }
        };

        async function getUserInfo(token) {
            try {
                const res = await fetch('https://api.twitch.tv/helix/users', { headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                loginID = data.data[0].login;
                fetchSheetData(loginID);
            } catch (e) { alert("Twitchログインに失敗しました"); }
        }

        async function fetchSheetData(targetUser) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Users`;
            const res = await fetch(url);
            const csvText = await res.text();
            const rows = csvText.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
            const userData = rows.find(row => row[1] && row[1].toLowerCase().trim() === targetUser.toLowerCase());

            if (userData) {
                document.getElementById('display-name').innerText = userData[0];
                document.getElementById('display-rank').innerText = userData[8] || "新顔さん";
                document.getElementById('display-bits').innerText = userData[5];
                document.getElementById('display-level').innerText = userData[7];

                const totalExp = parseInt(userData[6]) || 0;
                const level = parseInt(userData[7]) || 1;
                const progress = getLevelProgress(totalExp, level);
                document.getElementById('display-current-exp').innerText = progress.current;
                document.getElementById('display-next').innerText = progress.next;
                const percent = Math.min((progress.current / progress.next) * 100, 100);
                setTimeout(() => { document.getElementById('exp-bar').style.width = percent + '%'; }, 500);

                if(userData[2] != "0") document.getElementById('t1-badge').classList.add('tier-active');
                if(userData[3] != "0") document.getElementById('t2-badge').classList.add('tier-active');
                if(userData[4] != "0") document.getElementById('t3-badge').classList.add('tier-active');
            }
        }

        function getLevelProgress(totalExp, level) {
            const cfg = [{l:10,c:100},{l:20,c:500},{l:30,c:1000},{l:40,c:1500},{l:50,c:2000},{l:60,c:3000},{l:70,c:4000},{l:80,c:5000},{l:90,c:7000},{l:100,c:9000}];
            let accumulatedExp = 0, currentLevelStep = 1;
            for (let range of cfg) {
                while (currentLevelStep < range.l) {
                    if (currentLevelStep < level) { accumulatedExp += range.c; currentLevelStep++; }
                    else { return { current: Math.max(0, totalExp - accumulatedExp), next: range.c }; }
                }
            }
            return { current: (totalExp - 330900) % 10000, next: 10000 };
        }

        async function playGacha(mode, val = 0) {
            if (!loginID || !confirm("ガチャを引きますか？")) return;
            let query = `?user=${loginID}`;
            if (mode === 'login') query += `&type=login`;
            else if (mode === 'tier') query += `&gacha=${val}`;
            else if (mode === 'crystal') query += `&gacha=${val}`;

            const res = await fetch(GAS_URL + query);
            alert(await res.text());
            location.reload();
        }
    </script>
</body>
</html>
