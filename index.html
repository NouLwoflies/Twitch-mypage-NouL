<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIRLS STATUS - COMPLETE</title>
    <style>
        body { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); color: #5d00a8; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.95); border: 4px solid #ffb347; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(224, 176, 255, 0.5); text-align: center; width: 340px; }
        h1 { color: #ff8c00; font-size: 1.8rem; margin-bottom: 20px; text-shadow: 1px 1px 0px #fff; }
        
        /* ステータス項目 */
        .status-item { font-size: 1.1rem; margin: 10px 0; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px dashed #e0b0ff; }
        .crystal { color: #00b4d8; font-size: 1.3rem; }

        /* Tierバッジ */
        .tier-container { display: flex; justify-content: space-around; margin: 20px 0; }
        .tier-badge { padding: 5px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; background: #eee; color: #aaa; transition: 0.3s; }
        .tier-active { background: #9146ff; color: white; box-shadow: 0 0 10px rgba(145, 70, 255, 0.5); }

        /* 経験値バー */
        .exp-container { text-align: left; margin: 20px 0; }
        .exp-text { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; }
        .exp-outline { background: #eee; height: 14px; border-radius: 7px; margin-top: 5px; overflow: hidden; border: 1px solid #ffb347; }
        .exp-fill { background: linear-gradient(to right, #ffb347, #ff8c00); height: 100%; width: 0%; transition: 1.5s ease-out; }

        /* ボタン */
        .login-btn { background: #9146ff; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .sub-btn { background: white; border: 2px solid #ffb347; color: #ff8c00; padding: 8px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .sub-btn:hover { background: #fff5e6; }
    </style>
</head>
<body>

    <div class="card">
        <h1>GIRLS STATUS</h1>
        
        <div id="login-area">
            <button class="login-btn" onclick="login()">Twitchでログイン 💜</button>
        </div>

        <div id="status-area" style="display:none;">
            <div class="status-item"><span>PLAYER:</span> <span id="display-name">---</span></div>
            <div class="status-item"><span class="crystal">CRYSTAL:</span> <span id="display-bits" class="crystal">0</span></div>

            <div class="tier-container">
                <div id="t1-badge" class="tier-badge">Tier 1</div>
                <div id="t2-badge" class="tier-badge">Tier 2</div>
                <div id="t3-badge" class="tier-badge">Tier 3</div>
            </div>

            <div class="exp-container">
                <div class="exp-text">
                    <span>Lv. <span id="display-level">0</span></span>
                    <span>EXP: <span id="display-exp">0</span> / <span id="display-next">0</span></span>
                </div>
                <div class="exp-outline"><div id="exp-bar" class="exp-fill"></div></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="alert('ショップ準備中！')" class="sub-btn">🎁 報酬一覧</button>
                <button onclick="alert('バトルパス準備中！')" class="sub-btn">🎫 パス確認</button>
            </div>
        </div>
    </div>

    <script>
        // ★★★ 【設定箇所】必ず書き換えてください ★★★
        const CLIENT_ID = '3x3nwbmhvpdx1bxzs9d540ga31ud6b'; 
        const SHEET_ID = '14CnmqmOSGrLVvZcS-aeAA1pruGocgidtwC2ax7ArJhI';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        function login() {
            const url = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=user:read:email`;
            window.location.href = url;
        }

        window.onload = function() {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                const token = params.get('access_token');
                if (token) {
                    document.getElementById('login-area').style.display = 'none';
                    document.getElementById('status-area').style.display = 'block';
                    getUserInfo(token);
                }
            }
        };

        async function getUserInfo(token) {
            const res = await fetch('https://api.twitch.tv/helix/users', {
                headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const loginID = data.data[0].login;
            fetchSheetData(loginID);
        }

async function fetchSheetData(targetUser) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Users`;
            try {
                const res = await fetch(url);
                const csvText = await res.text();
                const rows = csvText.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '')));
                
                // ★修正ポイント：B列(index 1)でユーザーIDを照合します
                const userData = rows.find(row => row[1] && row[1].toLowerCase().trim() === targetUser.toLowerCase());

                if (userData) {
                    // ★修正ポイント：A列(0)をPLAYER名として表示します
                    document.getElementById('display-name').innerText = userData[0]; 
                    
                    // その他の列（F列以降）もスライドして設定
                    document.getElementById('display-bits').innerText = userData[5] || '0'; // F列: クリスタル
                    document.getElementById('display-level').innerText = userData[6] || '0'; // G列: Lv.
                    
                    const currentExp = parseInt(userData[7]) || 0; // H列: 現在EXP
                    const nextExp = parseInt(userData[8]) || 1;    // I列: 必要EXP
                    document.getElementById('display-exp').innerText = currentExp;
                    document.getElementById('display-next').innerText = nextExp;

                    // 経験値バー計算
                    const percent = Math.min((currentExp / nextExp) * 100, 100);
                    setTimeout(() => { document.getElementById('exp-bar').style.width = percent + '%'; }, 500);

                    // Tierバッジ有効化
                    if(userData[2] && userData[2] !== "0") document.getElementById('t1-badge').classList.add('tier-active');
                    if(userData[3] && userData[3] !== "0") document.getElementById('t2-badge').classList.add('tier-active');
                    if(userData[4] && userData[4] !== "0") document.getElementById('t3-badge').classList.add('tier-active');

                    document.getElementById('loading-msg').style.display = 'none';
                    document.getElementById('data-display').style.display = 'block';

                } else {
                    alert("スプレッドシートのB列にあなたのTwitch IDが見つかりませんでした！確認してみてね。");
                }
            } catch (e) { console.error(e); }
        }
