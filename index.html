<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>推し事の書</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- 画像のデザインを完全再現するためのベース --- */
        :root {
            --accent-orange: #e67e22;
            --twitch-purple: #9146ff;
            --text-navy: #2c3e50;
            --bg-card: rgba(255, 255, 255, 0.9);
        }

        body { 
            margin: 0; padding: 0; font-family: 'M PLUS 1p', sans-serif;
            background-image: url('https://cdn.discordapp.com/attachments/866687772056092682/1479124828115046450/525_20241011150841.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden; touch-action: pan-y;
        }

        /* 3画面を横に並べるためのコンテナ */
        .viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        .main-wrapper {
            display: flex; width: 300vw; height: 100vh;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .page-section {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            padding-top: 40px; box-sizing: border-box; overflow-y: auto;
        }

        /* 画像のカードデザインを再現 */
        .card { 
            background: var(--bg-card); border-radius: 30px;
            border: 2px solid #ffcc80; padding: 30px 20px;
            width: 85%; max-width: 360px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            color: var(--text-navy);
            margin-bottom: 120px; /* ナビ用の余白 */
        }

        /* --- 画像のパーツ再現 --- */
        h1 { font-size: 1.5rem; color: var(--accent-orange); margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-row { display: flex; justify-content: space-between; font-weight: 800; margin: 12px 0; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .crystal-text { color: #2980b9; }
        .level-num { font-size: 3rem; font-weight: 900; color: var(--accent-orange); line-height: 1; }
        
        .btn-orange { background: var(--accent-orange); color: white; border: none; border-radius: 15px; padding: 15px; width: 100%; font-weight: 800; font-size: 1rem; cursor: pointer; margin: 15px 0; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-outline { background: white; border: 2px solid #ffcc80; border-radius: 12px; padding: 10px; font-weight: 800; color: var(--accent-orange); font-size: 0.8rem; cursor: pointer; }

        /* ナビゲーション */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; height: 60px;
            background: rgba(255, 255, 255, 0.95); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item { border: none; background: none; font-size: 1.2rem; color: #ccc; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent-orange); transform: scale(1.2); }
    </style>
</head>
<body>

<div class="viewport">
    <div class="main-wrapper" id="master-container">
        
        <section class="page-section">
            <div class="card">
                <h1>🦊 推し事の書 🦊</h1>
                <div id="login-area"><button class="btn-orange" onclick="login()">Twitchでログイン</button></div>
                
                <div id="status-area" style="display:none;">
                    <div class="status-row"><span>PLAYER</span><span id="display-name">---</span></div>
                    <div class="status-row"><span>RANK</span><span id="display-rank" style="color:var(--accent-orange)">---</span></div>
                    <div class="status-row"><span class="crystal-text">CRYSTAL</span><span id="display-crystal" class="crystal-text">---</span></div>
                    
                    <div style="text-align: left; margin: 20px 0;">
                        <div style="display:flex; align-items:flex-end; gap:10px;">
                            <span style="font-size:0.8rem; font-weight:800; color:var(--accent-orange)">LEVEL</span>
                            <span id="display-level" class="level-num">0</span>
                        </div>
                        <div style="background:#eee; height:10px; border-radius:5px; margin-top:5px; overflow:hidden;">
                            <div id="exp-bar" style="background:var(--accent-orange); width:0%; height:100%; transition:1s;"></div>
                        </div>
                    </div>

                    <div style="font-size:0.7rem; font-weight:800; color:#ccc; margin-top:20px;">DAILY MISSION</div>
                    <button class="btn-orange" onclick="playGacha('login')">🎁 1日1回ログインガチャ</button>

                    <div style="font-size:0.7rem; font-weight:800; color:#ccc; margin-top:20px;">TIER ガチャ</div>
                    <div class="grid-3">
                        <button class="btn-outline" onclick="playGacha('tier', 1)">Tier 1</button>
                        <button class="btn-outline" onclick="playGacha('tier', 2)">Tier 2</button>
                        <button class="btn-outline" onclick="playGacha('tier', 3)">Tier 3</button>
                    </div>

                    <div style="font-size:0.7rem; font-weight:800; color:#ccc; margin-top:20px;">CRYSTAL ガチャ</div>
                    <div class="grid-2">
                        <button class="btn-outline" onclick="playBitsGacha(100)">100円</button>
                        <button class="btn-outline" onclick="playBitsGacha(500)">500円</button>
                        <button class="btn-outline" onclick="playBitsGacha(1000)">1000円</button>
                        <button class="btn-outline" onclick="playBitsGacha(5000)">5000円</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-section">
            <div class="card">
                <h1 style="color:var(--twitch-purple)">🏆 BATTLE PASS</h1>
                <div id="reward-list">
                    <div style="padding:15px; border:2px solid #eee; border-radius:15px; margin-bottom:10px; text-align:left;">
                        <span style="background:var(--twitch-purple); color:white; padding:2px 8px; border-radius:5px; font-size:0.7rem;">Lv.10</span>
                        <div style="font-weight:800; margin-top:5px;">限定PC壁紙</div>
                        <div id="msg-lv10" style="font-size:0.7rem; color:#ccc;">🔒 未達成</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-section">
            <div class="card">
                <h1 style="color:#7f8c8d">📜 GACHA LOG</h1>
                <div id="log-content" style="text-align:left; font-size:0.8rem; line-height:1.6;">履歴読み込み中...</div>
            </div>
        </section>

    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="updatePage(0)">👤</button>
    <button class="nav-item" onclick="updatePage(1)">🏆</button>
    <button class="nav-item" onclick="updatePage(2)">📜</button>
</nav>

<script>
    // --- 基本設定 ---
    const CLIENT_ID = '3x3nwbmhvpdx1bxzs9d540ga31ud6b';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwvnNqZbUMZKskqan4HJtexJCf37oG1s2xJHHJCBNchdm8G5Ri_qBgQyHrayYXMwwEy/exec';
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/14CnmqmOSGrLVvZcS-aeAA1pruGocgidtwC2ax7ArJhI/gviz/tq?tqx=out:csv&sheet=Users';
    let loginID = "", currentPage = 0;

    // --- スワイプ & ページ切り替え ---
    function updatePage(index) {
        currentPage = index;
        document.getElementById('master-container').style.transform = `translateX(-${index * 100}vw)`;
        const navs = document.querySelectorAll('.nav-item');
        navs.forEach((n, i) => i === index ? n.classList.add('active') : n.classList.remove('active'));
    }

    let startX = 0;
    document.addEventListener('touchstart', e => { startX = e.touches[0].pageX; });
    document.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].pageX - startX;
        if (Math.abs(diff) > 50) {
            if (diff < 0 && currentPage < 2) updatePage(currentPage + 1);
            if (diff > 0 && currentPage > 0) updatePage(currentPage - 1);
        }
    });

    // --- ログイン & データ取得 (既存ロジックを維持) ---
    function login() { /* Twitch連携URL */ window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=3x3nwbmhvpdx1bxzs9d540ga31ud6b&redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&response_type=token&scope=user:read:email`; }

    window.onload = function() {
        const token = new URLSearchParams(window.location.hash.substring(1)).get('access_token');
        if (token) {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('status-area').style.display = 'block';
            fetch('https://api.twitch.tv/helix/users', { headers: { 'Client-ID': '3x3nwbmhvpdx1bxzs9d540ga31ud6b', 'Authorization': `Bearer ${token}` } })
                .then(r => r.json()).then(d => { loginID = d.data[0].login; loadSheet(); });
        }
    };

    function loadSheet() {
        fetch(SHEET_URL).then(r => r.text()).then(txt => {
            const rows = txt.split('\n').map(r => r.split(',').map(c => c.replace(/"/g,'')));
            const user = rows.find(r => r[1] && r[1].toLowerCase() === loginID.toLowerCase());
            if (user) {
                document.getElementById('display-name').innerText = user[0];
                document.getElementById('display-rank').innerText = user[8] || "サポーター";
                document.getElementById('display-crystal').innerText = user[5]; // 6列目：bits fragments
                document.getElementById('display-level').innerText = user[7];
                const exp = parseInt(user[6]);
                const lv = parseInt(user[7]);
                // EXPバーの計算などは適宜追加
                document.getElementById('exp-bar').style.width = "50%"; // 仮
            }
        });
    }

    // ガチャ実行
    function playGacha(type, val) {
        let url = `${GAS_URL}?user=${loginID}&${type === 'login' ? 'type=login' : 'gacha='+val}`;
        fetch(url).then(r => r.text()).then(m => { alert(m); location.reload(); });
    }
</script>
</body>
</html>
